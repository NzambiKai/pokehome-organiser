<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>PokeHome Organiser - Old Data</title>
</head>
<body>
<div id="container" class="container"></div> 
<script type="text/javascript" src="assets/data-old.js"></script>
<script>
let output = "";
outputNationalDex();
document.getElementById("container").innerHTML = output;
function outputNationalDex() {
    pokemon.forEach(outputDexItems);
    function outputDexItems(pokemon, index) {
      output += pokemon.name + ", ";//`{ "number": ` + index+1 + `, "name": "` + pokemon.name + `", },`;
    }
}
</script>
</body>
</html>

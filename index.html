<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>PokeHome Organiser</title>
<style>
body {
    font-family: Arial, sans-serif;
}
.container {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    column-gap: 1px;
    row-gap: 1px;
    background-color: #f2f2f2;
    width: 800px;
    margin-left: auto;
    margin-right: auto;
}
.container > div {
    aspect-ratio: 1 / 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #e5e5e5;
    text-align: center;
    font-size: 1rem;
}
.container > div.subheader {
    grid-column: 1 / -1;
    aspect-ratio: auto;
    background-color: #cccccc;
}
</style>
</head>
<body>
<!-- <h1>National Dex</h1> -->
<div id="nationalDex" class="container"></div>
<!-- <h3>0001 - 0030</h3>
<img src="assets/images/bulbasaur.webp" alt="Bulbasaur"/>
<h1>Alt Forms</h1>
<h1>Shiny National Dex</h1>
<h1>Shiny Alt Forms</h1> -->
<script type="text/javascript" src="assets/data.js"></script> 
<script>
let output = "";
let blockIndex = 0;
pokemon.forEach(layout);
document.getElementById("nationalDex").innerHTML = output;
function layout(pokemon, index) {
  function formatDexNumber(num) {
    let insetNum = num+1;
    return insetNum.toString().padStart(4, '0');
  }
  if ((blockIndex) % 30 === 0) {
    output += "<div class='subheader'><h3>" + formatDexNumber(blockIndex) + " - " + formatDexNumber(blockIndex+29) + "</h3></div>";
  }
  output += "<div>#" + formatDexNumber(index) + "<br/>" + pokemon.name + "</div>";
  blockIndex++;
}
</script>
</body>
</html>

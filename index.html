<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>PokeHome Organiser</title>
<style>
.flex-container {
  display: flex;
  flex-flow: row wrap;
  background-color: DodgerBlue;
  width: 600px;
  margin-left:auto;
  margin-right:auto;
}
.flex-container > div {
  background-color: #f1f1f1;
  width: 100px;
  height: 100px;
  text-align: center;
  font-size: 1rem;
}
</style>
</head>
<body>
<h1>National Dex</h1>
<div id="nationalDex" class="flex-container"></div>
  <h3>0001 - 0030</h3>
  <img src="assets/images/bulbasaur.webp" alt="Bulbasaur"/>
<h1>Alt Forms</h1>
<h1>Shiny National Dex</h1>
<h1>Shiny Alt Forms</h1>
<script type='text/javascript' src="assets/data.js"></script>
<script>
let text = "";
pokemon.forEach(myFunction);
document.getElementById("nationalDex").innerHTML = text;
function myFunction(pokemon, index) {
		function formatDexNumber(num) {
			let insetNum = num+1;
			return "#" + insetNum.toString().padStart(4, '0');
		}
	text += "<div>" + formatDexNumber(index) + "<br/>" + pokemon.name + "</div>";
}
</script>
</body>
</html>

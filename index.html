<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>PokeHome Organiser</title>
<link href="assets/style.css" rel="stylesheet">
</head>
<body>
<div id="container" class="container"></div>
<script type="text/javascript" src="assets/data.js"></script> 
<script>
let output = "";
//let blockIndex = 0;
//header("ND");
//outputNationalDex();
header("Alt Forms");
outputAltForm("Alolan");
document.getElementById("container").innerHTML = output;
function header(title) {
    output += "<div class='header'><h1>" + title + "</h1></div>";
}
function outputNationalDex() {
    let blockIndex = 0;
    pokemon.forEach(outputDexItems);
    function outputDexItems(pokemon, index) {
      function formatDexNumber(num) {
        let insetNum = num+1;
        return insetNum.toString().padStart(4, '0');
      }
      if ((blockIndex) % 30 === 0) {
        output += "<div class='subheader'><h2>" + formatDexNumber(blockIndex) + " - " + formatDexNumber(blockIndex+29) + "</h2></div>";
      }
      output += "<div><font>" + formatDexNumber(index) + "</font>" + pokemon.name + "</div>";
      blockIndex++;
    }
}
function outputAltForm(title) {
    let blockIndex = 0;
    let lowercaseTitle = title.toLowerCase()
    pokemon.filter(item => lowercaseTitle in item).forEach(outputDexItems);
    function outputDexItems(pokemon, index) {
      function formatDexNumber(num) {
        let insetNum = num+1;
        return insetNum.toString().padStart(4, '0');
      }
      if ((blockIndex) % 30 === 0) {
        output += "<div class='subheader'><h2>" + title + " Forms 1</h2></div>";
      }
      output += "<div><font>" + formatDexNumber(index) + "</font>" + pokemon.name + "<br/>0" + pokemon[lowercaseTitle] + "</div>";
      blockIndex++;
    }
}
</script>
</body>
</html>
